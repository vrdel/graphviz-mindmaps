[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "graphviz-mindmaps"
version = "0.1.0"
description = "Graphviz-based mindmap renderer and related tooling"
requires-python = ">=3.9"
license = "Apache-2.0"
dependencies = ["Pillow"]

[project.scripts]
gvmm = "graphviz_mindmaps.cli:main"
"montage" = "montage:main"
"montit" = "montit:main"

[tool.setuptools]
include-package-data = true
py-modules = ["gvmm", "gvmm_helpers", "fontawesome", "montage", "montit"]

[tool.setuptools.packages.find]
include = ["graphviz_mindmaps*"]
